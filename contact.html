<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    color: #333;
    margin: 0;
    padding: 0;
}
.container {
    width: 100%;
    max-width: 800px;
    padding: 20px 40px;
    box-sizing: border-box;
    margin: auto;
}
.header {
    text-align: center;
    margin-bottom: 30px;
}
.header h1 {
    font-size: 2em;
    margin-bottom: 10px;
}
.header p {
    font-size: 1.1em;
    color: #666;
}
.section {
    background: white;
    padding: 20px 25px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.section h2 {
    color: #ff9800;
    margin-bottom: 10px;
}
.section p {
    line-height: 1.6;
}
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0 20px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 1em;
    box-sizing: border-box;
}
button {
    background-color: #ff9800;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1em;
}
button:hover {
    background-color: #e68900;
}
</style>
</head>
<body>
    <body>
    <!-- Navigation Bar -->
    <div style="display:flex; justify-content:space-around; align-items:center; background:#ff9800; color:white; padding:15px 0; font-weight:bold; position:sticky; top:0; z-index:1000;">
        <a href="web3.html" style="color:white; text-decoration:none; font-size:1.1em;">Home</a>
        <a href="about.html" style="color:white; text-decoration:none; font-size:1.1em;">About</a>
        <a href="contact.html" style="color:white; text-decoration:none; font-size:1.1em;">Contact</a>
    </div>

    <div class="container">
        <!-- Page content here -->
<div class="container">
    <div class="header">
        <h1>Contact Us</h1>
        <p>We’d love to hear from you! Send us a message or reach out through the contact info below.</p>
    </div>

    <div class="section">
        <h2>Contact Info</h2>
        <p>Email: support@fooddelivery.com</p>
        <p>Phone: +233 24 000 0000</p>
        <p>Address: Accra, Ghana</p>
    </div>

    <div class="section">
        <h2>Send Us a Message</h2>
        <form id="contactForm">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
</div>

<script>
// Simple alert on submit
document.getElementById('contactForm').addEventListener('submit', e => {
    e.preventDefault();
    alert('Thank you! Your message has been sent.');
    e.target.reset();
});
</script>
</body>
</html>
